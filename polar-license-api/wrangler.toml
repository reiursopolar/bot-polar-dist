name = "polar-license-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "polar-licenses"
database_id = "b95ce758-de4d-4280-8577-6326b3387b11"

# ── Secrets obrigatórios — configurar TODOS antes de fazer deploy ─────────
#
#   wrangler secret put HMAC_SECRET          ← cookie de sessão do dashboard
#   wrangler secret put DASHBOARD_PASSWORD   ← password do dashboard
#   wrangler secret put ED25519_PRIVATE_JWK  ← chave privada para assinar/verificar POLAR keys
#   wrangler secret put CREATOR_TOKEN        ← token do criador (qualquer string secreta)
#   wrangler secret put CRIADOR_PHONE        ← número do criador sem '+' (ex: 351913579908)
#
# ATENÇÃO: ED25519_PRIVATE_JWK deve corresponder ao _PUBLIC_X em src/licenca.js.
# Se regenerares o par de chaves, atualiza também _PUBLIC_X no bot.

[triggers]
crons = ["0 4 * * *"]
